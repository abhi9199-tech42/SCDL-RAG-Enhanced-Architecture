name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Check Python syntax
        run: python -m py_compile api/server.py api/core/mu_engine.py

      - name: Verify app imports
        run: python -c "from api.server import app; print(f'FastAPI app loaded: {len(app.routes)} routes')"

  docker:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose -f docker/docker-compose.yml build --no-cache

      - name: Start services
        run: |
          docker compose -f docker/docker-compose.yml up -d
          echo "Waiting for embedding service to load models (up to 180s)..."
          sleep 180

      - name: Health check
        run: |
          curl -f http://localhost:8888/v1/health || (docker compose -f docker/docker-compose.yml logs api && docker compose -f docker/docker-compose.yml logs embedding && exit 1)

      - name: Test detect endpoint
        run: |
          curl -s -X POST http://localhost:8888/v1/detect \
            -H "Authorization: Bearer sk_live_local_test" \
            -H "Content-Type: application/json" \
            -d '{"question":"What is capital of France?","answer":"Paris","documents":[{"id":"d1","content":"Paris is the capital of France."}]}' | python -c "import sys,json; d=json.load(sys.stdin); assert d['hallucination_detected']==False; print(f'detect OK: mu={d[\"mu_score\"]}')"

      - name: Test batch endpoint
        run: |
          curl -s -X POST http://localhost:8888/v1/detect/batch \
            -H "Authorization: Bearer sk_live_local_test" \
            -H "Content-Type: application/json" \
            -d '{"cases":[{"id":"c1","question":"Q","answer":"A","documents":[{"id":"d1","content":"Paris capital"}]}]}' | python -c "import sys,json; d=json.load(sys.stdin); assert len(d['results'])==1; print(f'batch OK: {d[\"total_time_ms\"]}ms')"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          docker tag docker-api ghcr.io/${{ github.repository_owner }}/scdl-rag-api:${{ github.sha }}
          docker tag docker-api ghcr.io/${{ github.repository_owner }}/scdl-rag-api:latest
          docker push ghcr.io/${{ github.repository_owner }}/scdl-rag-api:${{ github.sha }} || echo "GHCR push skipped (permissions)"
          docker push ghcr.io/${{ github.repository_owner }}/scdl-rag-api:latest || echo "GHCR push skipped (permissions)"

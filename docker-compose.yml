version: '3.8'

services:
  scdl-rag:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SCDL_API_KEY=${SCDL_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - VECTOR_STORE_DIMENSIONS=${VECTOR_STORE_DIMENSIONS:-384}
      - VECTOR_STORE_SIMILARITY_THRESHOLD=${VECTOR_STORE_SIMILARITY_THRESHOLD:-0.75}
      - URCM_RESONANCE_THRESHOLD=${URCM_RESONANCE_THRESHOLD:-0.6}
      - URCM_CONTRADICTION_SENSITIVITY=${URCM_CONTRADICTION_SENSITIVITY:-0.8}
      - RETRIEVAL_MAX_RESULTS=${RETRIEVAL_MAX_RESULTS:-20}
      - RETRIEVAL_MIN_SCORE=${RETRIEVAL_MIN_SCORE:-0.5}
      - PERFORMANCE_MAX_RESPONSE_TIME=${PERFORMANCE_MAX_RESPONSE_TIME:-1000}
      - PERFORMANCE_MAX_MEMORY_MB=${PERFORMANCE_MAX_MEMORY_MB:-1024}
      - CIRCUIT_BREAKER_FAILURE_THRESHOLD=${CIRCUIT_BREAKER_FAILURE_THRESHOLD:-5}
      - CIRCUIT_BREAKER_RECOVERY_TIMEOUT=${CIRCUIT_BREAKER_RECOVERY_TIMEOUT:-30000}
    volumes:
      - scdl-data:/app/data
      - scdl-logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=3", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

volumes:
  scdl-data:
  scdl-logs:
services:
  embedding:
    build:
      context: ..
      dockerfile: docker/embedding.Dockerfile
    ports:
      - "4096:4096"
    environment:
      - OMP_NUM_THREADS=2
      - EMBEDDING_PORT=4096
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; exit(0 if urllib.request.urlopen('http://127.0.0.1:4096/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 180s
    volumes:
      - /c/Users/kriti/.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8888:8000"
    environment:
      - API_KEY=${API_KEY:-sk_live_local_test}
      - EMBEDDING_SERVICE_URL=http://embedding:4096
      - ASYNC_WORKERS=4
    depends_on:
      embedding:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
